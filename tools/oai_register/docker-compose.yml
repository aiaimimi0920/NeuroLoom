version: '3.8'
services:
  oai_register:
    build: .
    container_name: oai_register_bot
    volumes:
      # 将结果目录映射出来，这样运行完毕后可以在外部直接查看 data/results.txt
      - ./data:/app/data
      # 映射源码，避免每次都要 rebuild
      - ./main.py:/app/main.py
    environment:
      - BLOCK_IMAGES=2 # 设为 2 会禁用图片 (极度推荐开启以省流量)
      - BLOCK_CSS=2    # 设为 2 会禁用 CSS (可能会改变网页结构，导致找不到元素)
      - BLOCK_FONTS=2  # 设为 2 会禁用自定义字体加载
      # 并发与防封参数设置
      - CONCURRENCY=5   # 同时运行的浏览器/注册线程数 (提升注册速度)
      - SLEEP_MIN=5      # 每个线程在完成一轮跑号后的最小休息时间(秒)
      - SLEEP_MAX=20     # 每个线程在完成一轮跑号后的最大休息时间(秒)
      # 已删除物理机全局代理设置 (防止和容器内的代理发生双重叠加消耗流量)
    shm_size: '4gb' # 给 10 个 Chrome 提供足够的共享内存防止崩溃
    restart: always
