      - MAILBOX_PICK_TRIES=1
      - DISABLE_PROXY=0
      - BLOCK_IMAGES=0
      - BLOCK_CSS=0
      - BLOCK_FONTS=0
      - BLOCK_GOOGLE_OPT_GUIDE=2
      - BLOCK_NOISY_HOSTS=2
      - CONCURRENCY=3
      - HEADLESS=1
      - ENABLE_REPAIRER=0
      - SLEEP_MIN=0
      - SLEEP_MAX=2
      - MAILCREATE_POLL_SECONDS=0.8
      - FATAL_DRIVER_RESTART_THRESHOLD=3

