version: '3.8'

x-register-common: &register-common
  build:
    context: .
    dockerfile: Dockerfile
  network_mode: bridge
  env_file:
    - ./.env.center
  volumes:
    - ./data:/data
    - ./main.py:/app/main.py
    - ./uploader.py:/app/uploader.py
    - ./repairer.py:/app/repairer.py
    - ../../mailcreate/client:/mailcreate/client:ro
  environment:
    - DATA_DIR=/data
    - DEBUG_TRACE=0
    - DUMP_PAGE_BODY=0
    - KEEP_ERROR_ARTIFACTS=0
    - BLOCK_IMAGES=2
    - BLOCK_CSS=2
    - BLOCK_FONTS=2
    - BLOCK_GOOGLE_OPT_GUIDE=2
    - BLOCK_NOISY_HOSTS=2
    - CONCURRENCY=4
    - HEADLESS=1
    - ENABLE_REPAIRER=0
    - SLEEP_MIN=0
    - SLEEP_MAX=2
    - MAILCREATE_POLL_SECONDS=0.8
    - FATAL_DRIVER_RESTART_THRESHOLD=3
  shm_size: '4gb'
  restart: always
  command: ["python", "main.py"]

services:
  codex_register_1:
    <<: *register-common
    container_name: codex_register_1
    environment:
      - DATA_DIR=/data
      - INSTANCE_ID=codex_register_1
      - DEBUG_TRACE=0
      - DUMP_PAGE_BODY=0
      - KEEP_ERROR_ARTIFACTS=0
      - BLOCK_IMAGES=2
      - BLOCK_CSS=2
      - BLOCK_FONTS=2
      - BLOCK_GOOGLE_OPT_GUIDE=2
      - BLOCK_NOISY_HOSTS=2
      - CONCURRENCY=4
      - HEADLESS=1
      - ENABLE_REPAIRER=0
      - SLEEP_MIN=0
      - SLEEP_MAX=2
      - MAILCREATE_POLL_SECONDS=0.8
      - FATAL_DRIVER_RESTART_THRESHOLD=3

  codex_register_2:
