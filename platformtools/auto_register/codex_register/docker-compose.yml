version: '3.8'

x-register-common: &register-common
  build:
    context: .
    dockerfile: Dockerfile
  network_mode: bridge
  env_file:
    - ./.env.center
  volumes:
    - ./data:/data
    - ./main.py:/app/main.py
    - ./uploader.py:/app/uploader.py
    - ./repairer.py:/app/repairer.py
    - ../../mailcreate/client:/mailcreate/client:ro
    - ../../../:/workspace:ro
  environment:
    - DATA_DIR=/data
    - PYTHONPATH=/workspace
    - DEBUG_TRACE=0
    - DUMP_PAGE_BODY=1
    - KEEP_ERROR_ARTIFACTS=1
    - MAILCREATE_DOMAIN=mail.aiaimimi.com
    - MAIL_DOMAIN_HEALTH_ORDER=mail.aiaimimi.com
    - MAILBOX_PICK_TRIES=1
    - DISABLE_PROXY=0
    - BLOCK_IMAGES=0
    - BLOCK_CSS=0
    - BLOCK_FONTS=0
    - BLOCK_GOOGLE_OPT_GUIDE=2
    - BLOCK_NOISY_HOSTS=2
    - CONCURRENCY=3
    - HEADLESS=1
    - ENABLE_REPAIRER=0
    - SLEEP_MIN=0
    - SLEEP_MAX=2
    - MAILCREATE_POLL_SECONDS=0.8
    - FATAL_DRIVER_RESTART_THRESHOLD=3
  shm_size: '4gb'
  restart: always
  command: ["python", "main.py"]

services:
  codex_register_1:
    <<: *register-common
    container_name: codex_register_1
    environment:
      - DATA_DIR=/data
